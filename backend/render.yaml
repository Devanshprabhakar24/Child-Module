services:
  - type: web
    name: child-module-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: APP_BASE_URL
        value: https://child-module.vercel.app
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: noreply@wombto18.com
      - key: RESEND_DOMAIN_VERIFIED
        value: true
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 465
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: WATI_ACCESS_TOKEN
        sync: false
      - key: WATI_API_ENDPOINT
        value: https://live-mt-server.wati.io/326037
      - key: USE_TWILIO
        value: true
      - key: PAYMENT_TEST_MODE
        value: false
      - key: OTP_EMAIL_TEST_MODE
        value: false
      - key: OTP_SMS_TEST_MODE
        value: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PHONE
        sync: false
      - key: ADMIN_FULL_NAME
        value: System Administrator
      - key: APP_NAME
        value: WombTo18
      - key: SUBSCRIPTION_PRICE
        value: 999
      - key: CURRENCY
        value: INR
