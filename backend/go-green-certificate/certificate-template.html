<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Go Green Certificate</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #e8f5e9;
      color: #388e3c;
      padding: 40px;
    }
    .certificate {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(56, 142, 60, 0.15);
      max-width: 600px;
      margin: auto;
      padding: 32px;
      text-align: center;
      border: 4px solid #388e3c;
    }
    .certificate h1 {
      color: #388e3c;
      font-size: 2.5em;
      margin-bottom: 0.5em;
    }
    .certificate p {
      font-size: 1.2em;
      margin: 1em 0;
    }
    .certificate .date {
      margin-top: 2em;
      color: #757575;
      font-size: 1em;
    }
    .certificate .logo {
      margin-bottom: 1em;
    }
  </style>
</head>
<body>
  <div class="certificate">
    <div class="logo">
      <img src="https://cdn-icons-png.flaticon.com/512/616/616494.png" alt="Go Green Logo" width="80" />
    </div>
    <h1>Go Green Certificate</h1>
    <p>This certificate is proudly presented to</p>
    <p style="font-weight:bold; font-size:1.5em;">[Recipient Name]</p>
    <p>for their outstanding commitment to environmental sustainability and green practices.</p>
    <div class="date">Date: [Date]</div>
    <p style="margin-top:2em;">Keep making the world greener!</p>
  </div>
</body>
</html>
